name: Deploy Demo zu GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Rechte, die der GitHub-Pages-Deploy braucht
permissions:
  contents: read
  pages: write
  id-token: write

# Es läuft immer nur ein Deploy gleichzeitig
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Statische Seite bauen (mit Unterpfad für Pages)
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /paul-grunau-website

      - name: Jekyll deaktivieren (damit _next-Ordner erhalten bleibt)
        run: touch out/.nojekyll

      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
